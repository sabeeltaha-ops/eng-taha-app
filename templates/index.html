<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ENG Taha — Daily Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#F3F6F5;
    --bg-panel:#ffffff;
    --bg-panel-2:#E6ECEA;
    --ink:#000000;
    --ink-dim:#000000;
    --ink-faint:#000000;
    --brass:#1B4F72;
    --brass-dim:#123A54;
    --teal:#2E7D5B;
    --alert:#C1560B;
    --grid-line: rgba(27,79,114,0.07);
    --radius: 3px;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:
      linear-gradient(var(--grid-line) 1px, transparent 1px) 0 0/100% 28px,
      linear-gradient(90deg, var(--grid-line) 1px, transparent 1px) 0 0/28px 100%,
      var(--bg);
    color:var(--ink);
    font-family:'Cambria','Georgia',serif;
    padding:32px 24px 60px;
    min-height:100vh;
  }
  .wrap{max-width:1100px;margin:0 auto;}
  header{
    display:flex;justify-content:space-between;align-items:flex-end;gap:24px;
    border-bottom:1px solid rgba(27,79,114,0.16);padding-bottom:20px;
    margin-bottom:18px;flex-wrap:wrap;
  }
  .eyebrow{
    font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:0.14em;
    text-transform:uppercase;color:var(--ink);margin-bottom:6px;
  }
  h1{font-family:'Fraunces',serif;font-weight:500;font-size:38px;margin:0;letter-spacing:-0.01em;}
  .stat-strip{
    display:flex;gap:22px;font-family:'IBM Plex Mono',monospace;font-size:12px;
    color:var(--ink-dim);margin-top:8px;flex-wrap:wrap;
  }
  .stat-strip b{color:var(--ink);font-weight:600;}
  .header-actions{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap;align-items:center;}
  .icon-btn, .icon-link{
    background:var(--bg-panel-2);border:1px solid rgba(27,79,114,0.18);color:var(--ink-dim);
    font-family:'IBM Plex Mono',monospace;font-size:10.5px;letter-spacing:0.04em;
    text-transform:uppercase;padding:6px 10px;border-radius:2px;cursor:pointer;
    text-decoration:none;display:inline-block;
  }
  .icon-btn:hover, .icon-link:hover{color:var(--ink);border-color:var(--brass);}
  .dial-block{display:flex;flex-direction:column;align-items:center;}
  .dial-label{
    font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:0.12em;
    text-transform:uppercase;color:var(--ink-faint);margin-top:2px;
  }
  .top-right{display:flex;align-items:center;gap:16px;}
  .logout-link{
    font-family:'IBM Plex Mono',monospace;font-size:10.5px;color:var(--ink-dim);
    text-decoration:none;border:1px solid rgba(27,79,114,0.18);padding:6px 10px;
    border-radius:2px;text-transform:uppercase;letter-spacing:.04em;
  }
  .logout-link:hover{border-color:var(--brass);}

  .history-panel{
    display:none;background:var(--bg-panel);border:1px solid rgba(27,79,114,0.12);
    box-shadow:0 1px 2px rgba(27,79,114,0.05);border-radius:var(--radius);
    padding:16px 18px;margin-bottom:18px;
  }
  .history-panel.show{display:block;}
  .history-panel-title{font-family:'Fraunces',serif;font-size:15px;font-weight:600;margin-bottom:10px;}
  .trend-title{
    font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.08em;
    text-transform:uppercase;color:var(--ink);margin-bottom:2px;
  }
  .history-row{
    display:flex;justify-content:space-between;align-items:center;
    padding:7px 0;border-bottom:1px solid var(--grid-line);font-size:13px;
  }
  .history-row:last-of-type{border-bottom:none;}
  .history-date{font-family:'IBM Plex Mono',monospace;font-weight:500;color:var(--ink);}
  .history-nums{font-family:'IBM Plex Mono',monospace;font-size:11.5px;color:var(--ink-dim);}

  .grid{display:grid;grid-template-columns:1.3fr 1fr 1fr;gap:18px;margin-bottom:18px;}
  @media (max-width:820px){.grid{grid-template-columns:1fr;}}
  .panel{
    background:var(--bg-panel);border:1px solid rgba(27,79,114,0.12);
    box-shadow:0 1px 2px rgba(27,79,114,0.05);border-radius:var(--radius);
    padding:18px 18px 16px;
  }
  .panel-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:14px;}
  .panel-title{font-family:'Fraunces',serif;font-size:16px;font-weight:600;letter-spacing:0.01em;}
  .panel-count{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--ink-faint);}

  .task-row{
    display:flex;align-items:center;gap:8px;padding:8px 0;
    border-bottom:1px solid var(--grid-line);flex-wrap:wrap;
  }
  .task-row:last-of-type{border-bottom:none;}
  .task-check{
    width:16px;height:16px;border:1px solid var(--ink-faint);border-radius:2px;
    cursor:pointer;flex-shrink:0;position:relative;background:transparent;
  }
  .task-check.done{background:var(--teal);border-color:var(--teal);}
  .task-check.done::after{content:'✓';position:absolute;top:-3px;left:2px;font-size:12px;color:var(--bg);}
  .task-text{flex:1 1 120px;font-size:13.5px;line-height:1.4;min-width:100px;}
  .task-text.done{color:var(--ink-faint);text-decoration:line-through;}
  .task-recur-badge{font-size:12px;flex-shrink:0;opacity:.65;color:var(--ink);}
  .task-due{
    font-family:'IBM Plex Mono',monospace;font-size:9.5px;letter-spacing:0.04em;
    padding:2px 6px;border-radius:2px;text-transform:uppercase;flex-shrink:0;
  }
  .task-due.today{background:rgba(27,79,114,0.14);color:var(--ink);}
  .task-due.overdue{background:rgba(193,86,11,0.16);color:var(--ink);}
  .task-due.future{background:var(--bg-panel-2);color:var(--ink-faint);}
  .task-cat{
    font-family:'IBM Plex Mono',monospace;font-size:9.5px;padding:2px 6px;border-radius:2px;
    background:var(--bg-panel-2);color:var(--ink-dim);flex-shrink:0;max-width:90px;
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
  }
  .task-pri{
    font-family:'IBM Plex Mono',monospace;font-size:9.5px;letter-spacing:0.06em;
    padding:2px 6px;border-radius:2px;text-transform:uppercase;flex-shrink:0;
  }
  .task-pri.high{background:rgba(193,86,11,0.16);color:var(--ink);}
  .task-pri.med{background:rgba(27,79,114,0.14);color:var(--ink);}
  .task-pri.low{background:rgba(46,125,91,0.14);color:var(--ink);}
  .task-del{background:none;border:none;color:var(--ink-faint);cursor:pointer;font-size:14px;flex-shrink:0;padding:0 2px;}
  .task-del:hover{color:var(--ink);}
  .task-link{color:var(--ink);text-decoration:none;font-size:13px;flex-shrink:0;line-height:1;}
  .task-attach{
    background:none;border:none;color:var(--ink-faint);opacity:0.55;cursor:pointer;
    font-size:13px;flex-shrink:0;padding:0 1px;line-height:1;
  }
  .task-attach:hover{opacity:1;color:var(--ink);}
  .add-row{display:flex;gap:6px;margin-top:12px;}
  .add-row2{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap;}
  select, input[type=text], input[type=number], input[type=date], textarea{
    background:var(--bg-panel-2);border:1px solid rgba(27,79,114,0.18);color:var(--ink);
    font-family:'Cambria','Georgia',serif;font-size:13px;border-radius:2px;padding:7px 9px;
  }
  select, input[type=date]{font-family:'IBM Plex Mono',monospace;font-size:11px;}
  input::placeholder, textarea::placeholder{color:var(--ink-faint);}
  .add-row input[type=text]{flex:1;min-width:0;}
  .btn{
    background:var(--brass-dim);color:#fff;border:none;padding:7px 12px;border-radius:2px;
    font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:0.04em;
    cursor:pointer;text-transform:uppercase;flex-shrink:0;
  }
  .btn:hover{background:var(--brass);}
  .toggle-btn{
    background:var(--bg-panel-2);border:1px solid rgba(27,79,114,0.18);
    color:var(--ink-faint);font-family:'IBM Plex Mono',monospace;font-size:10.5px;
    letter-spacing:0.03em;padding:7px 10px;border-radius:2px;cursor:pointer;
  }
  .toggle-btn.active{background:rgba(27,79,114,0.16);color:var(--ink);border-color:var(--brass);}

  .time-total{font-family:'IBM Plex Mono',monospace;font-size:26px;color:var(--ink);margin-bottom:4px;}
  .time-total span{font-size:13px;color:var(--ink-dim);}
  .entry-row{
    display:flex;justify-content:space-between;align-items:center;gap:8px;
    padding:7px 0;border-bottom:1px solid var(--grid-line);font-size:13px;
  }
  .entry-row:last-of-type{border-bottom:none;}
  .entry-left{display:flex;align-items:center;gap:6px;min-width:0;}
  .entry-label{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .entry-mins{font-family:'IBM Plex Mono',monospace;color:var(--ink-dim);font-size:12px;flex-shrink:0;}
  .time-controls{display:flex;gap:6px;margin-top:12px;flex-wrap:wrap;}
  .time-controls input[type=text]{flex:1;min-width:90px;}
  .add-time{display:flex;gap:6px;margin-top:8px;}
  .add-time input[type=number]{width:58px;}
  .timer-row{display:flex;gap:8px;margin-top:8px;align-items:center;}
  .timer-display{font-family:'IBM Plex Mono',monospace;font-size:13px;color:var(--ink-dim);min-width:46px;}
  .empty-hint{color:var(--ink-faint);font-size:12.5px;font-style:italic;padding:6px 0;}
  .cat-breakdown{margin-top:10px;padding-top:10px;border-top:1px solid var(--grid-line);}
  .cat-row{
    display:flex;justify-content:space-between;font-size:11.5px;color:var(--ink-dim);
    padding:3px 0;font-family:'IBM Plex Mono',monospace;
  }

  .goal{margin-bottom:14px;}
  .goal:last-of-type{margin-bottom:0;}
  .goal-top{display:flex;justify-content:space-between;font-size:13px;margin-bottom:6px;}
  .goal-name{font-weight:500;}
  .goal-nums{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--ink-dim);}
  .goal-bar-track{height:6px;background:var(--bg-panel-2);border-radius:3px;overflow:hidden;}
  .goal-bar-fill{height:100%;background:var(--teal);border-radius:3px;transition:width .3s;}
  .goal-controls{display:flex;gap:6px;margin-top:6px;align-items:center;}
  .goal-controls button{
    background:var(--bg-panel-2);border:1px solid rgba(27,79,114,0.18);color:var(--ink);
    width:22px;height:22px;border-radius:2px;cursor:pointer;font-size:13px;line-height:1;
  }
  .goal-del{margin-left:auto;background:none;border:none;color:var(--ink-faint);cursor:pointer;font-size:12px;}
  .goal-del:hover{color:var(--ink);}
  .add-goal{display:flex;gap:6px;margin-top:14px;flex-wrap:wrap;}
  .add-goal input[type=text]{flex:1;min-width:80px;}
  .add-goal input[type=number]{width:64px;}

  .notes-panel textarea{
    width:100%;min-height:110px;resize:vertical;font-family:'Cambria','Georgia',serif;
    font-size:14px;line-height:1.65;
  }
  .save-tag{
    font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--ink-faint);
    margin-top:6px;opacity:0;transition:opacity .3s;
  }
  .save-tag.show{opacity:1;}
  input[type=file]{display:none;}
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div>
      <div class="eyebrow" id="eyebrow-date">—</div>
      <h1>ENG Taha</h1>
      <div class="stat-strip">
        <span><b id="stat-tasks">0/0</b> tasks</span>
        <span><b id="stat-time">0h 0m</b> logged</span>
        <span><b id="stat-goals">0</b> goals on watch</span>
      </div>
      <div class="header-actions">
        <button type="button" class="icon-btn" id="history-btn">⏱ History</button>
        <a class="icon-link" id="pdf-link" href="#">⬇ PDF</a>
        <a class="icon-link" id="backup-link" href="#">⬇ Backup</a>
        <button type="button" class="icon-btn" id="restore-btn">⬆ Restore</button>
        <input type="file" id="restore-file-input" accept="application/json">
      </div>
    </div>
    <div class="top-right">
      <div class="dial-block">
        <svg width="130" height="80" viewBox="0 0 130 80">
          <path d="M 10 72 A 55 55 0 0 1 120 72" fill="none" stroke="rgba(27,79,114,0.12)" stroke-width="8" stroke-linecap="round"/>
          <path id="dial-arc" d="M 10 72 A 55 55 0 0 1 120 72" fill="none" stroke="var(--brass)" stroke-width="8" stroke-linecap="round" stroke-dasharray="173" stroke-dashoffset="173"/>
          <line id="dial-needle" x1="65" y1="72" x2="65" y2="24" stroke="var(--alert)" stroke-width="2"/>
          <circle cx="65" cy="72" r="4" fill="var(--alert)"/>
          <text id="dial-pct" x="65" y="66" text-anchor="middle" font-family="IBM Plex Mono" font-size="14" fill="var(--ink)">0%</text>
        </svg>
        <div class="dial-label">Day complete</div>
      </div>
      <a class="logout-link" href="/logout">Sign out</a>
    </div>
  </header>

  <div class="history-panel" id="history-panel">
    <div class="trend-title">Trend — last 7 days (% tasks complete)</div>
    <div id="trend-chart"></div>
    <div class="history-panel-title" style="margin-top:16px;">Past days</div>
    <div id="history-list"></div>
  </div>

  <div class="grid">
    <div class="panel">
      <div class="panel-head">
        <div class="panel-title">Tasks &amp; To&#8209;dos</div>
        <div class="panel-count" id="task-count">0</div>
      </div>
      <div id="task-list"></div>
      <div class="add-row">
        <input type="text" id="task-input" placeholder="Add a task…" maxlength="120">
        <select id="task-pri-input">
          <option value="med" selected>Med</option>
          <option value="high">High</option>
          <option value="low">Low</option>
        </select>
        <button class="btn" id="task-add-btn">Add</button>
      </div>
      <div class="add-row2">
        <input type="date" id="task-due-input" title="Due date">
        <input type="text" id="task-category-input" list="category-list" placeholder="Category" maxlength="24" style="width:110px;">
        <button type="button" class="toggle-btn" id="task-recur-toggle" title="Repeat this task every day">↻ Daily</button>
      </div>
    </div>

    <div class="panel">
      <div class="panel-head">
        <div class="panel-title">Time Log</div>
        <div class="panel-count" id="time-count">0 entries</div>
      </div>
      <div class="time-total" id="time-total-display">0h <span>0m</span></div>
      <div id="time-list"></div>
      <div class="cat-breakdown" id="cat-breakdown" style="display:none;">
        <div id="cat-breakdown-list"></div>
      </div>
      <div class="time-controls">
        <input type="text" id="time-label-input" placeholder="What on…" maxlength="60">
        <input type="text" id="time-category-input" list="category-list" placeholder="Category" maxlength="24" style="width:100px;">
      </div>
      <div class="add-time">
        <input type="number" id="time-mins-input" placeholder="min" min="1" max="720">
        <button class="btn" id="time-add-btn">Log</button>
      </div>
      <div class="timer-row">
        <button type="button" class="toggle-btn" id="timer-toggle-btn">▶ Start</button>
        <span class="timer-display" id="timer-display">00:00</span>
      </div>
    </div>

    <div class="panel">
      <div class="panel-head">
        <div class="panel-title">Goals &amp; KPIs</div>
        <div class="panel-count" id="goal-count">0</div>
      </div>
      <div id="goal-list"></div>
      <div class="add-goal">
        <input type="text" id="goal-name-input" placeholder="Goal name" maxlength="60">
        <input type="number" id="goal-target-input" placeholder="target" min="1">
        <input type="text" id="goal-unit-input" placeholder="unit" maxlength="12" style="width:56px;">
        <button class="btn" id="goal-add-btn">Track</button>
      </div>
    </div>
  </div>

  <div class="panel notes-panel">
    <div class="panel-head"><div class="panel-title">Notes &amp; Priorities</div></div>
    <textarea id="notes-input" placeholder="Today's focus, blockers, things to remember…"></textarea>
    <div class="save-tag" id="save-tag">Saved</div>
  </div>

  <datalist id="category-list"></datalist>

</div>

<script>
let tasks = [];
let timeEntries = [];
let goals = [];
let todayStr = "";
let saveTagTimeout = null;
let notesTimeout = null;
let taskRecurActive = false;
let timerRunning = false;
let timerStart = null;
let timerInterval = null;

function pad(n){ return n.toString().padStart(2,'0'); }
function getTodayDateStr(){
  const d = new Date();
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
}
function formatEyebrow(){
  const d = new Date();
  return d.toLocaleDateString('en-US', { weekday:'long', month:'short', day:'numeric' }).toUpperCase();
}
function formatShortDate(iso){
  const parts = iso.split('-');
  const months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return `${months[parseInt(parts[1],10)-1]} ${parseInt(parts[2],10)}`;
}
function escapeHtml(str){
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}
function flashSaved(){
  const tag = document.getElementById('save-tag');
  tag.classList.add('show');
  clearTimeout(saveTagTimeout);
  saveTagTimeout = setTimeout(()=>tag.classList.remove('show'), 1200);
}

async function api(path, options={}){
  const res = await fetch(path, { headers: { 'Content-Type': 'application/json' }, ...options });
  if(res.status === 401){ window.location.href = '/login'; return null; }
  if(!res.ok){
    const body = await res.json().catch(()=>({error:'Request failed'}));
    throw new Error(body.error || 'Request failed');
  }
  if(res.status === 204) return null;
  return res.json();
}

function dueBadge(due){
  if(!due) return '';
  let cls = 'future', label = formatShortDate(due);
  if(due === todayStr){ cls = 'today'; label = 'Today'; }
  else if(due < todayStr){ cls = 'overdue'; label = 'Overdue'; }
  return `<span class="task-due ${cls}">${label}</span>`;
}

function render(){
  const priRank = { high:0, med:1, low:2 };
  const sorted = [...tasks].sort((a,b)=>{
    const ad = a.due || '9999-99-99';
    const bd = b.due || '9999-99-99';
    if(ad !== bd) return ad < bd ? -1 : 1;
    return priRank[a.pri] - priRank[b.pri];
  });

  const taskList = document.getElementById('task-list');
  taskList.innerHTML = '';
  if(sorted.length === 0){
    taskList.innerHTML = '<div class="empty-hint">No tasks yet — add today\'s first one below.</div>';
  }
  sorted.forEach(t=>{
    const row = document.createElement('div');
    row.className = 'task-row';
    row.innerHTML = `
      <div class="task-check ${t.done?'done':''}" data-id="${t.id}"></div>
      <div class="task-text ${t.done?'done':''}">${escapeHtml(t.text)}</div>
      ${t.recurring_id ? '<span class="task-recur-badge" title="Repeats daily">↻</span>' : ''}
      ${dueBadge(t.due)}
      ${t.category ? `<span class="task-cat" title="${escapeHtml(t.category)}">${escapeHtml(t.category)}</span>` : ''}
      <div class="task-pri ${t.pri}">${t.pri}</div>
      ${t.link ? `<a class="task-link" href="${escapeHtml(t.link)}" target="_blank" rel="noopener" title="${escapeHtml(t.link)}">📎</a><button class="task-attach" data-id="${t.id}" title="Edit attachment">✎</button>` : `<button class="task-attach" data-id="${t.id}" title="Attach a document link">📎</button>`}
      <button class="task-del" data-id="${t.id}" data-recurring="${t.recurring_id ? '1':'0'}">✕</button>
    `;
    taskList.appendChild(row);
  });
  const done = tasks.filter(t=>t.done).length;
  document.getElementById('task-count').textContent = `${done}/${tasks.length}`;
  document.getElementById('stat-tasks').textContent = `${done}/${tasks.length}`;

  const timeList = document.getElementById('time-list');
  timeList.innerHTML = '';
  if(timeEntries.length === 0){
    timeList.innerHTML = '<div class="empty-hint">Nothing logged yet.</div>';
  }
  timeEntries.forEach(e=>{
    const row = document.createElement('div');
    row.className = 'entry-row';
    row.innerHTML = `<span class="entry-left"><span class="entry-label">${escapeHtml(e.label)}</span>${e.category ? `<span class="task-cat">${escapeHtml(e.category)}</span>` : ''}</span><span class="entry-mins">${e.mins}m</span>`;
    timeList.appendChild(row);
  });
  const totalMins = timeEntries.reduce((s,e)=>s+e.mins,0);
  const h = Math.floor(totalMins/60), m = totalMins%60;
  document.getElementById('time-total-display').innerHTML = `${h}h <span>${m}m</span>`;
  document.getElementById('time-count').textContent = `${timeEntries.length} entries`;
  document.getElementById('stat-time').textContent = `${h}h ${m}m`;

  const catBlock = document.getElementById('cat-breakdown');
  const catList = document.getElementById('cat-breakdown-list');
  if(timeEntries.length > 0){
    const map = {};
    timeEntries.forEach(e=>{
      const cat = e.category || 'Uncategorized';
      map[cat] = (map[cat]||0) + e.mins;
    });
    const rows = Object.entries(map).sort((a,b)=>b[1]-a[1]);
    catList.innerHTML = rows.map(([cat,mins])=>{
      const ch = Math.floor(mins/60), cm = mins%60;
      return `<div class="cat-row"><span>${escapeHtml(cat)}</span><span>${ch}h ${cm}m</span></div>`;
    }).join('');
    catBlock.style.display = 'block';
  } else {
    catBlock.style.display = 'none';
  }

  const goalList = document.getElementById('goal-list');
  goalList.innerHTML = '';
  if(goals.length === 0){
    goalList.innerHTML = '<div class="empty-hint">No goals on watch — add one below.</div>';
  }
  goals.forEach(g=>{
    const pct = Math.min(100, Math.round((g.current/g.target)*100));
    const row = document.createElement('div');
    row.className = 'goal';
    row.innerHTML = `
      <div class="goal-top">
        <span class="goal-name">${escapeHtml(g.name)}</span>
        <span class="goal-nums">${g.current}/${g.target} ${escapeHtml(g.unit||'')}</span>
      </div>
      <div class="goal-bar-track"><div class="goal-bar-fill" style="width:${pct}%"></div></div>
      <div class="goal-controls">
        <button data-id="${g.id}" data-delta="-1">−</button>
        <button data-id="${g.id}" data-delta="1">+</button>
        <button class="goal-del" data-id="${g.id}">remove</button>
      </div>
    `;
    goalList.appendChild(row);
  });
  document.getElementById('goal-count').textContent = goals.length;
  document.getElementById('stat-goals').textContent = goals.length;

  const pct = tasks.length ? Math.round((done/tasks.length)*100) : 0;
  const circumference = 173;
  const offset = circumference - (circumference * pct/100);
  document.getElementById('dial-arc').setAttribute('stroke-dashoffset', offset);
  document.getElementById('dial-pct').textContent = pct + '%';
  const angle = -90 + (pct/100)*180;
  const rad = angle * Math.PI/180;
  document.getElementById('dial-needle').setAttribute('x2', 65 + 40*Math.sin(rad));
  document.getElementById('dial-needle').setAttribute('y2', 72 - 40*Math.cos(rad));
}

// ---- Tasks ----
document.getElementById('task-add-btn').addEventListener('click', addTask);
document.getElementById('task-input').addEventListener('keydown', e=>{ if(e.key==='Enter') addTask(); });
document.getElementById('task-recur-toggle').addEventListener('click', ()=>{
  taskRecurActive = !taskRecurActive;
  document.getElementById('task-recur-toggle').classList.toggle('active', taskRecurActive);
});
async function addTask(){
  const input = document.getElementById('task-input');
  const text = input.value.trim();
  if(!text) return;
  const pri = document.getElementById('task-pri-input').value;
  const dueInput = document.getElementById('task-due-input');
  const catInput = document.getElementById('task-category-input');
  const due = dueInput.value || undefined;
  const category = catInput.value.trim() || undefined;
  try{
    const created = await api('/api/tasks', {
      method:'POST',
      body: JSON.stringify({ date: todayStr, text, pri, due, category, recurring: taskRecurActive })
    });
    if(created){
      tasks.push(created);
      input.value=''; dueInput.value=''; catInput.value='';
      taskRecurActive = false;
      document.getElementById('task-recur-toggle').classList.remove('active');
      if(category) refreshCategories();
      render();
    }
  }catch(err){ window.alert(err.message); }
}

document.getElementById('task-list').addEventListener('click', async e=>{
  const id = e.target.dataset.id;
  if(!id) return;
  if(e.target.classList.contains('task-check')){
    const t = tasks.find(t=>t.id===id);
    if(!t) return;
    t.done = !t.done;
    render();
    try{ await api(`/api/tasks/${id}`, { method:'PATCH', body: JSON.stringify({ done: t.done }) }); }
    catch(err){ window.alert(err.message); }
  } else if(e.target.classList.contains('task-del')){
    const t = tasks.find(t=>t.id===id);
    let stopRecurring = false;
    if(t && t.recurring_id){
      stopRecurring = window.confirm('This task repeats daily. Stop repeating it too?');
    }
    tasks = tasks.filter(t=>t.id!==id);
    render();
    try{ await api(`/api/tasks/${id}?stop_recurring=${stopRecurring?'1':'0'}`, { method:'DELETE' }); }
    catch(err){ window.alert(err.message); }
  } else if(e.target.classList.contains('task-attach')){
    const t = tasks.find(t=>t.id===id);
    if(!t) return;
    const val = window.prompt('Paste a document link (Google Drive, etc.) — leave blank to remove:', t.link || '');
    if(val === null) return;
    const trimmed = val.trim();
    t.link = trimmed || null;
    render();
    try{ await api(`/api/tasks/${id}`, { method:'PATCH', body: JSON.stringify({ link: t.link }) }); }
    catch(err){ window.alert(err.message); }
  }
});

// ---- Time log ----
document.getElementById('time-add-btn').addEventListener('click', addTime);
document.getElementById('time-mins-input').addEventListener('keydown', e=>{ if(e.key==='Enter') addTime(); });
async function addTime(){
  const labelInput = document.getElementById('time-label-input');
  const minsInput = document.getElementById('time-mins-input');
  const catInput = document.getElementById('time-category-input');
  const label = labelInput.value.trim();
  const mins = parseInt(minsInput.value, 10);
  if(!label || !mins || mins<=0) return;
  const category = catInput.value.trim() || undefined;
  try{
    const created = await api('/api/time', { method:'POST', body: JSON.stringify({ date: todayStr, label, mins, category }) });
    if(created){
      timeEntries.push(created);
      labelInput.value=''; minsInput.value=''; catInput.value='';
      if(category) refreshCategories();
      render();
    }
  }catch(err){ window.alert(err.message); }
}

// ---- Live timer ----
document.getElementById('timer-toggle-btn').addEventListener('click', toggleTimer);
function toggleTimer(){
  const btn = document.getElementById('timer-toggle-btn');
  if(!timerRunning){
    timerStart = Date.now();
    timerRunning = true;
    btn.textContent = '■ Stop';
    btn.classList.add('active');
    timerInterval = setInterval(updateTimerDisplay, 1000);
    updateTimerDisplay();
  } else {
    clearInterval(timerInterval);
    const elapsedMs = Date.now() - timerStart;
    const mins = Math.max(1, Math.round(elapsedMs/60000));
    const labelInput = document.getElementById('time-label-input');
    const catInput = document.getElementById('time-category-input');
    const label = labelInput.value.trim() || 'Focus session';
    const category = catInput.value.trim() || undefined;
    api('/api/time', { method:'POST', body: JSON.stringify({ date: todayStr, label, mins, category }) })
      .then(created=>{
        if(created){
          timeEntries.push(created);
          if(category) refreshCategories();
          render();
        }
      })
      .catch(err=>window.alert(err.message));
    timerRunning = false;
    btn.textContent = '▶ Start';
    btn.classList.remove('active');
    document.getElementById('timer-display').textContent = '00:00';
    labelInput.value = ''; catInput.value = '';
  }
}
function updateTimerDisplay(){
  const elapsed = Math.floor((Date.now()-timerStart)/1000);
  document.getElementById('timer-display').textContent = `${pad(Math.floor(elapsed/60))}:${pad(elapsed%60)}`;
}

// ---- Goals ----
document.getElementById('goal-add-btn').addEventListener('click', addGoal);
async function addGoal(){
  const nameInput = document.getElementById('goal-name-input');
  const targetInput = document.getElementById('goal-target-input');
  const unitInput = document.getElementById('goal-unit-input');
  const name = nameInput.value.trim();
  const target = parseInt(targetInput.value, 10);
  if(!name || !target || target<=0) return;
  try{
    const created = await api('/api/goals', { method:'POST', body: JSON.stringify({ name, target, unit: unitInput.value.trim() }) });
    if(created){ goals.push(created); nameInput.value=''; targetInput.value=''; unitInput.value=''; render(); }
  }catch(err){ window.alert(err.message); }
}
document.getElementById('goal-list').addEventListener('click', async e=>{
  const id = e.target.dataset.id;
  if(!id) return;
  const g = goals.find(g=>g.id===id);
  if(!g) return;
  if(e.target.classList.contains('goal-del')){
    goals = goals.filter(g=>g.id!==id);
    render();
    try{ await api(`/api/goals/${id}`, { method:'DELETE' }); }
    catch(err){ window.alert(err.message); }
  } else if(e.target.dataset.delta){
    const delta = parseInt(e.target.dataset.delta, 10);
    g.current = Math.max(0, g.current + delta);
    render();
    try{ await api(`/api/goals/${id}`, { method:'PATCH', body: JSON.stringify({ delta }) }); }
    catch(err){ window.alert(err.message); }
  }
});

// ---- Notes ----
document.getElementById('notes-input').addEventListener('input', e=>{
  const content = e.target.value;
  clearTimeout(notesTimeout);
  notesTimeout = setTimeout(async ()=>{
    try{
      await api('/api/notes', { method:'PUT', body: JSON.stringify({ date: todayStr, content }) });
      flashSaved();
    }catch(err){ console.error(err); }
  }, 500);
});

// ---- Categories ----
async function refreshCategories(){
  try{
    const cats = await api('/api/categories');
    const dl = document.getElementById('category-list');
    dl.innerHTML = (cats || []).map(c=>`<option value="${escapeHtml(c)}"></option>`).join('');
  }catch(err){ /* non-critical */ }
}

// ---- History + Trend ----
document.getElementById('history-btn').addEventListener('click', toggleHistory);
function renderTrendChart(days){
  const chronological = [...days].reverse(); // oldest -> newest
  const barW = 28, gap = 12, maxBarH = 56, chartW = chronological.length*(barW+gap)+8, chartH = 100;
  let bars = '';
  chronological.forEach((d,i)=>{
    const pct = d.total ? Math.round((d.done/d.total)*100) : 0;
    const x = i*(barW+gap) + 8;
    const barH = Math.max(2, (pct/100)*maxBarH);
    const y = maxBarH - barH + 14;
    const label = new Date(d.date + 'T00:00:00').toLocaleDateString('en-US',{weekday:'short'}).slice(0,1);
    bars += `<rect x="${x}" y="${y}" width="${barW}" height="${barH}" fill="var(--brass)" rx="1"/>`;
    bars += `<text x="${x+barW/2}" y="${maxBarH+30}" text-anchor="middle" font-family="IBM Plex Mono" font-size="9" fill="var(--ink)">${label}</text>`;
    bars += `<text x="${x+barW/2}" y="${y-4}" text-anchor="middle" font-family="IBM Plex Mono" font-size="8" fill="var(--ink)">${pct}%</text>`;
  });
  return `<svg width="100%" height="110" viewBox="0 0 ${chartW} ${chartH}" preserveAspectRatio="xMinYMid meet">${bars}</svg>`;
}
async function toggleHistory(){
  const panel = document.getElementById('history-panel');
  if(panel.classList.contains('show')){ panel.classList.remove('show'); return; }
  panel.classList.add('show');
  const trendEl = document.getElementById('trend-chart');
  const list = document.getElementById('history-list');
  trendEl.innerHTML = '<div class="empty-hint">Loading…</div>';
  list.innerHTML = '<div class="empty-hint">Loading…</div>';
  try{
    const history = await api('/api/history?days=14');
    const trendDays = history.slice(0, 7);
    trendEl.innerHTML = renderTrendChart(trendDays);

    const pastDays = history.filter(d=>d.date !== todayStr && d.total > 0);
    if(pastDays.length === 0){
      list.innerHTML = '<div class="empty-hint">No past days recorded yet.</div>';
      return;
    }
    list.innerHTML = pastDays.map(d=>{
      const h = Math.floor(d.mins/60), m = d.mins%60;
      return `<div class="history-row"><span class="history-date">${d.date}</span><span class="history-nums">${d.done}/${d.total} tasks · ${h}h ${m}m</span></div>`;
    }).join('');
  }catch(err){
    trendEl.innerHTML = '';
    list.innerHTML = '<div class="empty-hint">Couldn\'t load history.</div>';
  }
}

// ---- PDF / Backup / Restore ----
document.getElementById('pdf-link').addEventListener('click', e=>{
  e.preventDefault();
  window.location.href = `/api/export.pdf?date=${todayStr}`;
});
document.getElementById('backup-link').addEventListener('click', e=>{
  e.preventDefault();
  window.location.href = '/api/backup';
});
document.getElementById('restore-btn').addEventListener('click', ()=>{
  document.getElementById('restore-file-input').click();
});
document.getElementById('restore-file-input').addEventListener('change', async e=>{
  const file = e.target.files[0];
  if(!file) return;
  let data;
  try{
    const text = await file.text();
    data = JSON.parse(text);
  }catch(err){
    window.alert('That file could not be read as a backup.');
    e.target.value = '';
    return;
  }
  const ok = window.confirm('This will overwrite your current data with this backup. Continue?');
  e.target.value = '';
  if(!ok) return;
  try{
    await api('/api/restore', { method:'POST', body: JSON.stringify(data) });
    window.alert('Restore complete. Reloading the dashboard…');
    location.reload();
  }catch(err){
    window.alert('Restore failed: ' + err.message);
  }
});

// ---- Init ----
async function init(){
  document.getElementById('eyebrow-date').textContent = formatEyebrow();
  todayStr = getTodayDateStr();
  try{
    const [day, goalList] = await Promise.all([
      api(`/api/day?date=${todayStr}`),
      api('/api/goals')
    ]);
    if(day){
      tasks = day.tasks || [];
      timeEntries = day.time_entries || [];
      document.getElementById('notes-input').value = day.notes || '';
    }
    goals = goalList || [];
  }catch(err){ console.error(err); }
  refreshCategories();
  render();
}
init();
</script>
